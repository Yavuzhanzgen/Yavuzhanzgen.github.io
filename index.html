<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yavuzhan | Cyber Portfolio</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    overflow: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

.content {
    position: relative;
    z-index: 1;
    padding: 50px;
}

h1 {
    font-size: 40px;
}

.cursor {
    display: inline-block;
    background: #00ff9f;
    width: 10px;
    height: 20px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}

.box {
    margin-top: 30px;
    border: 1px solid #00ff9f;
    padding: 20px;
    width: fit-content;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="content">
    <h1>> Yavuzhan<span class="cursor"></span></h1>

    <div class="box">
        <p>> Cyber Security Student</p>
        <p>> Malware Analysis</p>
        <p>> Reverse Engineering</p>
    </div>

    <div class="box">
        <p>> Projects:</p>
        <p>- C2 Server</p>
        <p>- Screen Capture Tool</p>
    </div>

    <div class="box">
        <p>> Contact:</p>
        <p>github.com/yavuzhanzgen</p>
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
